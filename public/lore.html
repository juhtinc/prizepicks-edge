<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Lore — Production Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06070a;--bg2:#0c0d12;--bg3:#12141b;--bg4:#191c25;--bg5:#21252f;
  --border:rgba(212,144,15,0.06);--border2:rgba(212,144,15,0.12);--border3:rgba(212,144,15,0.22);
  --gold:#d4920f;--gold2:#b87d0a;--gold-bright:#f5b623;--gold-dim:rgba(212,146,15,0.08);
  --red:#e84040;--red-dim:rgba(232,64,64,0.1);
  --green:#34d67a;--green-dim:rgba(52,214,122,0.1);
  --blue:#5b9ef5;--blue-dim:rgba(91,158,245,0.1);
  --text:#d8d0c4;--text2:#8a7e6e;--text3:#504838;
}
html{scrollbar-color:var(--bg4) var(--bg);scrollbar-width:thin}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}

/* Cinematic ambient light */
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 80% 50% at 15% -10%,rgba(212,146,15,0.04),transparent),
  radial-gradient(ellipse 60% 60% at 90% 110%,rgba(212,146,15,0.025),transparent);
  pointer-events:none;z-index:-1}

/* Film grain removed for readability */

/* ── Animations ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.25}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(212,146,15,0)}50%{box-shadow:0 0 12px 2px rgba(212,146,15,0.15)}}

/* ── Nav ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(6,7,10,0.85);backdrop-filter:blur(24px) saturate(1.2);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;height:48px}
.nav-brand{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:20px;letter-spacing:3px;color:var(--gold);display:flex;align-items:center;gap:10px}
.nav-brand .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 2.5s ease-in-out infinite;box-shadow:0 0 8px rgba(212,146,15,0.4)}
.nav-tabs{display:flex;gap:2px;margin-left:36px}
.nav-tab{padding:6px 16px;font-size:11px;font-weight:600;color:var(--text3);border-radius:4px;transition:all 0.2s;cursor:pointer;text-decoration:none;letter-spacing:0.3px}
.nav-tab:hover{color:var(--text2);background:var(--bg3)}
.nav-tab.active{color:var(--gold);background:var(--gold-dim)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.nav-status{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:0.5px}

/* ── Buttons ── */
.btn{padding:6px 14px;font-size:10px;font-weight:600;border-radius:4px;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;border:1px solid var(--border);letter-spacing:0.3px;text-transform:uppercase}
.btn:active{transform:scale(0.97)}
.btn-gold{color:#000;background:linear-gradient(135deg,var(--gold-bright),var(--gold));border-color:var(--gold);box-shadow:0 2px 8px rgba(212,146,15,0.2)}
.btn-gold:hover{background:linear-gradient(135deg,#f5c040,var(--gold-bright));box-shadow:0 4px 16px rgba(212,146,15,0.3)}
.btn-dim{color:var(--gold);background:var(--gold-dim);border-color:var(--border2)}
.btn-dim:hover{background:rgba(212,146,15,0.14);border-color:var(--border3)}
.btn-red{color:var(--red);background:var(--red-dim);border-color:rgba(232,64,64,0.15)}
.btn-red:hover{background:rgba(232,64,64,0.16)}
.btn-green{color:var(--green);background:var(--green-dim);border-color:rgba(52,214,122,0.15)}
.btn-green:hover{background:rgba(52,214,122,0.16)}
.btn-sm{padding:4px 10px;font-size:9px}

/* ── Layout ── */
.main{padding:60px 28px 28px;max-width:1440px;margin:0 auto}
.main.detail-open .section-header,.main.detail-open .batch-row,.main.detail-open #scriptsArea{display:none}
.main.detail-open .detail-back-row{display:flex}
.detail-back-row{display:none;align-items:center;gap:12px;margin:4px 0 10px}
.detail-back-row .back-btn{font-size:11px;color:var(--gold);cursor:pointer;display:flex;align-items:center;gap:6px;padding:6px 0;font-weight:600;letter-spacing:0.3px;transition:color 0.15s}
.detail-back-row .back-btn:hover{color:var(--gold-bright)}
.detail-back-row .breadcrumb{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:0.5px}

/* ── Section ── */
.section-header{display:flex;align-items:baseline;gap:12px;margin:28px 0 14px;animation:fadeUp 0.4s ease-out both}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:26px;font-weight:400;letter-spacing:2px;color:var(--text)}
.section-badge{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;background:var(--bg3);padding:3px 8px;border-radius:3px;letter-spacing:0.5px}

/* ── Batch Cards ── */
.batch-row{display:flex;gap:12px;flex-wrap:wrap}
.batch-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px 18px;cursor:pointer;transition:all 0.2s;min-width:200px;position:relative;overflow:hidden;animation:fadeUp 0.4s ease-out both}
.batch-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;transition:opacity 0.3s}
.batch-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.batch-card:hover::before{opacity:1}
.batch-card.active{border-color:var(--gold);background:var(--gold-dim)}
.batch-card.active::before{opacity:1}
.batch-id{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--gold)}
.batch-meta{display:flex;gap:8px;margin-top:6px;align-items:center}
.status-pill{font-size:9px;font-weight:700;padding:3px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:0.8px;font-family:'DM Sans',sans-serif}
.status-pill.ready,.status-pill.produced{color:var(--green);background:var(--green-dim)}
.status-pill.review,.status-pill.preview{color:var(--gold);background:var(--gold-dim)}
.status-pill.sourcing,.status-pill.sourcingclips{color:var(--blue);background:var(--blue-dim)}
.status-pill.pending{color:var(--text3);background:var(--bg4)}
.batch-count{font-size:10px;color:var(--text2)}

/* ── Script Table ── */
.script-table{width:100%;border-collapse:separate;border-spacing:0 2px}
.script-table th{text-align:left;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;padding:8px 12px;border-bottom:1px solid var(--border);font-family:'DM Sans',sans-serif;font-weight:600}
.script-table td{padding:10px 12px;font-size:12px;background:var(--bg2);transition:background 0.12s}
.script-table tr{cursor:pointer}
.script-table tr td:first-child{border-radius:6px 0 0 6px}
.script-table tr td:last-child{border-radius:0 6px 6px 0}
.script-table tr:hover td{background:var(--bg3)}
.script-table tr.selected td{background:var(--gold-dim)}
.script-table tbody tr{animation:fadeUp 0.3s ease-out both}
.script-table tbody tr:nth-child(1){animation-delay:0.05s}
.script-table tbody tr:nth-child(2){animation-delay:0.1s}
.script-table tbody tr:nth-child(3){animation-delay:0.15s}
.script-table tbody tr:nth-child(4){animation-delay:0.2s}
.script-table tbody tr:nth-child(5){animation-delay:0.25s}
.script-table tbody tr:nth-child(6){animation-delay:0.3s}
.script-table tbody tr:nth-child(7){animation-delay:0.35s}
.player-cell{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:6px;background:var(--bg4);overflow:hidden;flex-shrink:0;border:1px solid var(--border)}
.avatar img{width:100%;height:100%;object-fit:cover}
.player-name{font-weight:600;font-size:13px;color:var(--text)}
.player-sport{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.tag{font-size:9px;padding:3px 8px;border-radius:3px;font-weight:600;background:var(--gold-dim);color:var(--gold);text-transform:capitalize;letter-spacing:0.3px}
.clip-dots{display:flex;gap:3px}
.clip-dot{width:4px;height:4px;border-radius:50%}
.clip-dot.ok{background:var(--green);box-shadow:0 0 4px rgba(52,214,122,0.3)}
.clip-dot.no{background:var(--bg5)}

/* ── Detail Panel ── */
.detail{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-top:8px;overflow:hidden;animation:fadeUp 0.3s ease-out both;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.detail-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:linear-gradient(180deg,rgba(212,146,15,0.03),transparent)}
.detail-photo{width:48px;height:60px;border-radius:6px;background:var(--bg4);overflow:hidden;border:1px solid var(--border2);flex-shrink:0}
.detail-photo img{width:100%;height:100%;object-fit:cover}
.detail-title{font-family:'Libre Caslon Text',serif;font-size:18px;font-weight:700;letter-spacing:0.3px}
.detail-sub{font-size:11px;color:var(--text2);margin-top:3px;font-family:'JetBrains Mono',monospace;letter-spacing:0.3px}
.detail-actions{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}

/* ── Detail Layout: Editor Style ── */
.detail-workspace{display:flex;border-top:1px solid var(--border);height:calc(100vh - 200px);min-height:400px}
.detail-main{flex:1;min-width:0;padding:16px 20px;overflow-y:auto}
.detail-main::-webkit-scrollbar{width:4px}
.detail-main::-webkit-scrollbar-track{background:transparent}
.detail-main::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}
.detail-sidebar{width:300px;flex-shrink:0;padding:16px;border-left:1px solid var(--border);display:flex;flex-direction:column;gap:12px;overflow-y:auto;background:rgba(0,0,0,0.15)}
.detail-sidebar::-webkit-scrollbar{width:4px}
.detail-sidebar::-webkit-scrollbar-track{background:transparent}
.detail-sidebar::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}

/* Phone preview */
.phone-frame{width:180px;height:320px;border-radius:20px;border:2px solid #1e2230;overflow:hidden;background:#000;margin:0 auto;position:relative;box-shadow:0 8px 32px rgba(0,0,0,0.5),inset 0 0 0 1px rgba(255,255,255,0.03)}
.phone-frame video{width:100%;height:100%;object-fit:cover}
.phone-frame .phone-overlay{position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(0,0,0,.5));pointer-events:none}

/* Sidebar actions */
.sidebar-actions{display:flex;flex-direction:column;gap:6px}
.sidebar-info{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);line-height:1.8;letter-spacing:0.3px;padding:10px;background:var(--bg3);border-radius:6px}
.narrator-box{background:var(--bg3);border-left:2px solid var(--gold);padding:10px 12px;border-radius:0 6px 6px 0;font-size:11px;color:var(--text);line-height:1.6}
.narrator-label{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;font-weight:600}

/* Inline editable fields */
.editable{cursor:text;border:1px solid transparent;border-radius:4px;padding:4px 6px;margin:-4px -6px;transition:all 0.15s}
.editable:hover{border-color:var(--border2);background:rgba(255,255,255,0.02)}
.editable:focus{outline:none;border-color:var(--gold);background:var(--bg3)}
.editable[contenteditable="true"]{white-space:pre-wrap}
.edit-hint{font-size:8px;color:var(--text3);opacity:0;transition:opacity 0.15s;margin-top:2px;font-style:italic}
.editable:hover ~ .edit-hint,.editable:focus ~ .edit-hint{opacity:1}

/* Script overview (collapsible) */
.script-overview{background:var(--bg3);border-radius:6px;padding:12px 14px;margin-bottom:16px;border:1px solid var(--border)}
.script-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;transition:color 0.15s}
.script-toggle:hover{color:var(--gold)}
.script-body-text{font-size:12px;line-height:1.7;color:var(--text);margin-top:10px;display:none}
.script-body-text.open{display:block}

/* Clip timeline rows */
.clip-row{display:flex;gap:8px;align-items:center;padding:8px 10px;border-radius:5px;margin-bottom:2px;border:1px solid transparent;transition:all 0.12s;cursor:pointer;user-select:none;position:relative}
.clip-row:hover{background:rgba(255,255,255,0.02);border-color:var(--border)}
.clip-row.active{background:var(--gold-dim);border-color:var(--border2)}
.clip-row.drag-over{border-color:var(--gold);background:rgba(212,146,15,0.04)}
.clip-row.dragging{opacity:0.3}
.clip-row-num{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);width:18px;text-align:center;flex-shrink:0}
.clip-row-thumb{width:36px;height:64px;border-radius:4px;background:var(--bg4);overflow:hidden;flex-shrink:0;border:1px solid var(--border)}
.clip-row-thumb video{width:100%;height:100%;object-fit:cover}
.clip-row-text{flex:1;min-width:0}
.clip-row-caption{font-size:11px;line-height:1.4;color:var(--text);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.clip-row-time{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--text3);margin-top:2px;letter-spacing:0.5px}
.clip-row-actions{display:flex;gap:3px;align-items:center;flex-shrink:0;opacity:0;transition:opacity 0.15s}
.clip-row:hover .clip-row-actions{opacity:1}
.clip-row.active .clip-row-actions{opacity:1}
.drag-handle{cursor:grab;color:var(--text3);font-size:12px;padding:0 2px;opacity:0.4;transition:opacity 0.15s}
.clip-row:hover .drag-handle{opacity:0.8}

/* Pipeline stage indicators */
.pipeline-stages{display:flex;gap:0;align-items:center}
.pipeline-stage{display:flex;align-items:center;gap:0}
.pipeline-step{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:32px}
.pipeline-dot{width:7px;height:7px;border-radius:50%;background:var(--bg5);transition:all 0.2s}
.pipeline-dot.done{background:var(--green);box-shadow:0 0 4px rgba(52,214,122,0.3)}
.pipeline-dot.active{background:var(--gold);box-shadow:0 0 6px rgba(212,146,15,0.4);animation:glowPulse 2s infinite}
.pipeline-dot.fail{background:var(--red)}
.pipeline-label{font-size:7px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.pipeline-step.done .pipeline-label{color:var(--green)}
.pipeline-step.active .pipeline-label{color:var(--gold)}
.pipeline-connector{width:8px;height:1px;background:var(--bg5);flex-shrink:0}
.pipeline-connector.done{background:var(--green)}

/* Script regen modal */
.regen-modal{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:300;display:flex;align-items:center;justify-content:center}
.regen-panel{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;width:600px;max-width:95vw;max-height:85vh;overflow:hidden;animation:fadeUp 0.2s ease-out both;box-shadow:0 16px 48px rgba(0,0,0,0.5)}
.regen-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.regen-body{padding:20px;overflow-y:auto;max-height:60vh}
.regen-textarea{width:100%;padding:10px 12px;font-size:12px;background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-family:'DM Sans',sans-serif;resize:vertical;min-height:60px;outline:none;line-height:1.5}
.regen-textarea:focus{border-color:var(--gold)}
.regen-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.version-chip{font-size:9px;padding:3px 8px;border-radius:3px;background:var(--bg4);color:var(--text3);cursor:pointer;transition:all 0.12s;font-family:'JetBrains Mono',monospace}
.version-chip:hover{background:var(--gold-dim);color:var(--gold)}

/* Clip section header */
.clip-section-label{font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:6px;display:flex;justify-content:space-between;font-weight:600}

/* Approval state on clip rows */
.clip-row.approved{border-left:2px solid var(--green)}
.clip-row.rejected{border-left:2px solid var(--red);opacity:0.45}
.clip-row.rejected:hover{opacity:0.7}
.clip-status-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.clip-status-dot.ok{background:var(--green);box-shadow:0 0 6px rgba(52,214,122,0.3)}
.clip-status-dot.no{background:var(--red);box-shadow:0 0 6px rgba(232,64,64,0.3)}
.clip-status-dot.pending{background:var(--text3)}

/* Approval progress bar */
.approval-bar{display:flex;align-items:center;gap:10px;margin-bottom:0;padding:8px 20px}
.approval-track{flex:1;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.approval-fill{height:100%;border-radius:2px;transition:width 0.4s ease-out}
.approval-fill.green{background:linear-gradient(90deg,var(--green),#5ee89a);background-size:200% 100%;animation:shimmer 3s ease infinite}
.approval-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);white-space:nowrap;letter-spacing:0.5px}

/* Rejection reason picker */
.reject-picker{position:fixed;z-index:500;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:6px;box-shadow:0 12px 40px rgba(0,0,0,0.6),0 0 0 1px rgba(212,146,15,0.05);min-width:180px;animation:fadeUp 0.15s ease-out both}
.reject-option{display:block;width:100%;text-align:left;padding:7px 12px;font-size:11px;color:var(--text);background:none;border:none;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.1s}
.reject-option:hover{background:var(--red-dim);color:var(--red)}

/* YouTube search modal */
.yt-modal{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:300;display:flex;align-items:center;justify-content:center}
.yt-panel{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;width:900px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;animation:fadeUp 0.2s ease-out both;box-shadow:0 16px 48px rgba(0,0,0,0.5)}
.yt-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.yt-header h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--text)}
.yt-search-row{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg3)}
.yt-search-input{flex:1;padding:8px 12px;font-size:13px;background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none}
.yt-search-input:focus{border-color:var(--gold)}
.yt-results{flex:1;overflow-y:auto;padding:12px 20px}
.yt-result{display:flex;gap:12px;padding:10px;border-radius:6px;cursor:pointer;transition:all 0.12s;border:1px solid transparent;margin-bottom:6px}
.yt-result:hover{background:var(--bg3);border-color:var(--border)}
.yt-result.selected{background:var(--gold-dim);border-color:var(--border2)}
.yt-thumb{width:120px;height:68px;border-radius:4px;overflow:hidden;flex-shrink:0;background:var(--bg4)}
.yt-thumb img{width:100%;height:100%;object-fit:cover}
.yt-info{flex:1;min-width:0}
.yt-title{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.yt-channel{font-size:10px;color:var(--text3)}
.yt-clip-controls{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:12px;align-items:center;background:var(--bg3)}
.yt-clip-controls label{font-size:11px;color:var(--text2);white-space:nowrap}
.yt-clip-controls input[type="number"]{width:60px;padding:5px 8px;background:var(--bg);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-size:12px;font-family:'JetBrains Mono',monospace}
.yt-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}

@media(max-width:900px){
  .detail-workspace{flex-direction:column;height:auto}
  .detail-sidebar{width:100%;border-left:none;border-top:1px solid var(--border);flex-direction:row;flex-wrap:wrap;justify-content:center;background:transparent}
}

/* Timeline segments */
.tl-segment{padding:10px 12px;border-radius:5px;margin-bottom:4px;border:1px solid transparent;cursor:pointer;transition:all 0.15s}
.tl-segment:hover{background:rgba(255,255,255,0.015);border-color:var(--border)}
.tl-segment.active{background:var(--gold-dim);border-color:var(--border2)}
.tl-seg-head{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.tl-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold);font-weight:500;letter-spacing:0.5px}
.tl-phase{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.tl-text{font-size:13px;line-height:1.65;color:var(--text)}
.tl-text .gold{color:var(--gold-bright);font-weight:700}
.tl-text .red{color:var(--red);font-weight:700}

/* ── Clip Panel ── */
.clip-panel-title{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-weight:600}
.clip-preview{background:var(--bg4);border-radius:8px;overflow:hidden;aspect-ratio:9/16;max-height:280px;position:relative;margin-bottom:10px}
.clip-preview video{width:100%;height:100%;object-fit:cover}
.clip-preview .empty-clip{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:12px}
.clip-actions{display:flex;gap:6px;margin-bottom:16px}

.clip-grid-sm{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px}
.clip-thumb{aspect-ratio:9/16;background:var(--bg4);border-radius:5px;overflow:hidden;cursor:pointer;transition:all 0.15s;border:2px solid transparent;position:relative}
.clip-thumb:hover{border-color:var(--border2)}
.clip-thumb.active{border-color:var(--gold)}
.clip-thumb.approved{border-color:var(--green)}
.clip-thumb.rejected{border-color:var(--red);opacity:0.5}
.clip-thumb video{width:100%;height:100%;object-fit:cover}
.clip-thumb .badge{position:absolute;top:3px;right:3px;font-size:8px;padding:1px 4px;border-radius:3px;font-weight:700}
.clip-thumb .badge.ok{background:var(--green);color:#000}
.clip-thumb .badge.no{background:var(--red);color:#fff}
.clip-num{position:absolute;bottom:2px;left:4px;font-size:8px;color:rgba(255,255,255,0.6);font-family:'JetBrains Mono',monospace}

/* ── Script Text Panel ── */
.script-panel{margin-top:12px}
.script-section{margin-bottom:14px}
.script-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;font-weight:600}
.script-hook{font-family:'Libre Caslon Text',serif;font-size:14px;color:var(--gold);font-weight:400;font-style:italic;line-height:1.6}
.script-body{font-size:13px;line-height:1.7;color:var(--text)}
.script-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);margin-top:3px;letter-spacing:0.3px}

/* ── Video Player ── */
.render-player{background:var(--bg4);border-radius:6px;overflow:hidden;aspect-ratio:9/16;max-height:300px;margin-top:8px}
.render-player video{width:100%;height:100%;object-fit:contain}
.render-placeholder{display:flex;align-items:center;justify-content:center;height:100px;color:var(--text3);font-size:11px;font-style:italic}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:10px 18px;font-size:11px;color:var(--gold);z-index:200;transform:translateY(80px) scale(0.95);opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);font-weight:500;letter-spacing:0.3px;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.toast.show{transform:translateY(0) scale(1);opacity:1}

/* ── Loading ── */
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--text3);font-size:12px;letter-spacing:0.5px}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;margin-right:10px}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:12px;font-style:italic}

@media(max-width:768px){
  .main{padding:56px 12px 12px}
}

  <div id="detailArea"></div>

<div class="toast" id="toast"></div>

<script>
const API = "/api/lore?route=dashboard";
const SECRET = "picks25";
const R2 = "https://pub-86aa1c96eda04a8099526017d95dbb8f.r2.dev";

let curBatch = null, curScript = null, curClipIdx = 0;
let scriptData = null; // full script detail

async function api(action, params = {}) {
  const qs = new URLSearchParams({ action, ...params }).toString();
  const r = await fetch(`${API}&${qs}`, { headers: { "x-secret": SECRET } });
  return r.json();
}

async function apiPost(action, body = {}) {
  const r = await fetch(`${API}&action=${action}`, {
    method: "POST",
    headers: { "x-secret": SECRET, "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  return r.json();
}

const REJECTION_REASONS = [
  { id: "wrong_player", label: "Wrong player" },
  { id: "low_res", label: "Low resolution" },
  { id: "irrelevant", label: "Irrelevant footage" },
  { id: "wrong_sport", label: "Wrong sport" },
  { id: "too_short", label: "Too short / cut off" },
  { id: "bad_audio", label: "Bad audio / watermark" },
];

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

// ── Batches ──
async function loadBatches() {
  const { batches = [] } = await api("batches");
  document.getElementById("batchCount").textContent = batches.length;
  document.getElementById("batchRow").innerHTML = batches.length ? batches.map(b => `
    <div class="batch-card ${curBatch === b.batchId ? 'active' : ''}" onclick="selectBatch('${b.batchId}')">
      <div class="batch-id">${b.batchId}</div>
      <div class="batch-meta">
        <span class="status-pill ${(b.status||'').toLowerCase().replace(/\s/g,'')}">${b.status||'?'}</span>
        <span class="batch-count">${b.videoCount||'?'} videos</span>
      </div>
    </div>
  `).join("") : '<div class="empty">No batches</div>';
}

// ── Scripts ──
async function selectBatch(id) {
  curBatch = id; curScript = null;
  loadBatches();
  document.getElementById("scriptsArea").innerHTML = '<div class="loading"><div class="spinner"></div>Loading scripts...</div>';
  document.getElementById("detailArea").innerHTML = "";

  const { scripts = [] } = await api("scripts", { batchId: id });
  document.getElementById("scriptCount").textContent = scripts.length;
  if (!scripts.length) { document.getElementById("scriptsArea").innerHTML = '<div class="empty">No scripts</div>'; return; }

  // Batch summary stats
  const totalSourced = scripts.reduce((s,x) => s + (x.clipsSourced||0), 0);
  const totalApproved = scripts.reduce((s,x) => s + (x.clipsApproved||0), 0);
  const totalRejected = scripts.reduce((s,x) => s + (x.clipsRejected||0), 0);
  const totalClipSlots = scripts.length * 18;

  document.getElementById("scriptsArea").innerHTML = `
  <div style="display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap">
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);padding:8px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;letter-spacing:0.3px">
      <span style="color:var(--text2)">${scripts.length}</span> scripts
      <span style="margin:0 6px;opacity:0.3">|</span>
      <span style="color:var(--text2)">${totalSourced}</span>/<span style="color:var(--text3)">${totalClipSlots}</span> sourced
      <span style="margin:0 6px;opacity:0.3">|</span>
      <span style="color:var(--green)">${totalApproved}</span> approved
      ${totalRejected > 0 ? `<span style="margin:0 6px;opacity:0.3">|</span><span style="color:var(--red)">${totalRejected}</span> rejected` : ''}
    </div>
  </div>
  ${(() => {
    const withAnalytics = scripts.filter(s => s.viewsAt48h != null);
    if (!withAnalytics.length) return '';
    const avgViews = Math.round(withAnalytics.reduce((s,x) => s + x.viewsAt48h, 0) / withAnalytics.length);
    const avgRetention = (withAnalytics.reduce((s,x) => s + (x.retentionAt48h||0), 0) / withAnalytics.length).toFixed(1);
    const best = withAnalytics.sort((a,b) => (b.viewsAt48h||0) - (a.viewsAt48h||0))[0];
    return `<div style="display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap">
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);padding:8px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;letter-spacing:0.3px">
        <span style="color:var(--text2)">ANALYTICS</span>
        <span style="margin:0 6px;opacity:0.3">|</span>
        avg <span style="color:var(--gold-bright)">${avgViews.toLocaleString()}</span> views
        <span style="margin:0 6px;opacity:0.3">|</span>
        avg <span style="color:${parseFloat(avgRetention) > 50 ? 'var(--green)' : 'var(--text2)'}">${avgRetention}%</span> retention
        <span style="margin:0 6px;opacity:0.3">|</span>
        top: ${best.playerName} (${best.viewsAt48h?.toLocaleString()})
      </div>
    </div>`;
  })()}
  <table class="script-table"><thead><tr>
    <th>Player</th><th>Type</th><th>Pipeline</th><th>Clips</th><th>Review</th>
  </tr></thead><tbody>${scripts.map(s => {
    const approved = s.clipsApproved||0;
    const sourced = s.clipsSourced||0;
    const pct = sourced > 0 ? Math.round((approved / sourced) * 100) : 0;
    // Pipeline stages: Script → Clips → Voice → Render → Published
    const stages = [
      { name: 'Script', done: s.hasScript },
      { name: 'Clips', done: s.hasClips },
      { name: 'Voice', done: s.hasVoice },
      { name: 'Render', done: s.hasRender },
      { name: 'Live', done: s.isPublished },
    ];
    // Find the current active stage (first not-done)
    const activeIdx = stages.findIndex(st => !st.done);

    return `
    <tr onclick="selectScript('${s.rowId}')" class="${curScript===s.rowId?'selected':''}">
      <td><div class="player-cell">
        <div class="avatar" id="avatar-${s.rowId}">${s.playerPhotoUrl?`<img src="${s.playerPhotoUrl}">`:''}</div>
        <div><div class="player-name">${s.playerName||'?'}</div><div class="player-sport">${s.playerSport||''} · <span class="tag" style="display:inline">${(s.storyType||'').replace(/_/g,' ')}</span></div></div>
      </div></td>
      <td><div class="pipeline-stages">
        ${stages.map((st, si) => {
          const cls = st.done ? 'done' : si===activeIdx ? 'active' : '';
          return `${si>0?'<div class="pipeline-connector'+(si<=activeIdx||activeIdx===-1?' done':'')+'"></div>':''}
          <div class="pipeline-step ${cls}">
            <div class="pipeline-dot ${cls}"></div>
            <div class="pipeline-label">${st.name}</div>
          </div>`;
        }).join('')}
      </div></td>
      <td><div class="clip-dots" title="${sourced} sourced">${Array.from({length:Math.min(s.clipBriefCount||7, 18)},(_,i)=>`<div class="clip-dot ${i<sourced?'ok':'no'}"></div>`).join('')}</div></td>
      <td style="font-family:'JetBrains Mono';font-size:10px;color:${pct===100?'var(--green)':pct>0?'var(--text2)':'var(--text3)'}">${approved}/${sourced} ${pct===100?'✓':''}</td>
    </tr>`;
  }).join("")}</tbody></table>`;

  // Auto-fetch Wikipedia photos for players without one
  fetchPlayerPhotos(scripts);
}

// ── Script Detail with Timeline ──
function closeDetail() {
  curScript = null;
  scriptData = null;
  document.getElementById("mainContainer").classList.remove("detail-open");
  document.getElementById("detailArea").innerHTML = "";
}

async function selectScript(rowId) {
  curScript = rowId; curClipIdx = 0;
  // Collapse batches/scripts, show back button
  document.getElementById("mainContainer").classList.add("detail-open");
  document.getElementById("detailBreadcrumb").textContent = `${curBatch} / ${rowId}`;

  document.getElementById("detailArea").innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
  const { script: s } = await api("script-detail", { rowId });
  if (!s) { document.getElementById("detailArea").innerHTML = '<div class="empty">Not found</div>'; return; }
  scriptData = s;

  const clips = s.clipBriefs || [];
  const TOTAL_CLIPS = 18; // ~3s per clip for 55s video
  const clipUrls = [];
  for (let i = 1; i <= TOTAL_CLIPS; i++) {
    const brief = clips.find(c => c.slot === i);
    const url = brief?.clipUrl || `${R2}/${rowId}/clip_${i}.mp4`;
    clipUrls.push({
      slot: i, url, source: brief?.source || 'unknown',
      segmentName: brief?.segmentName || '',
      approved: !!brief?.approved,
      rejected: !!brief?.rejected,
      rejectionReason: brief?.rejectionReason || null,
      clipUrl: brief?.clipUrl,
    });
  }

  // Build timeline segments from story template
  const segments = getSegments(s.storyType);
  const scriptSentences = splitIntoSegments(s.hookLine, s.script, segments);

  document.getElementById("detailArea").innerHTML = `
  <div class="detail">
    <div class="detail-head">
      <div class="detail-photo" id="detailPhoto" onclick="uploadPlayerPhoto('${rowId}')" style="cursor:pointer" title="Click to upload photo">${s.playerPhotoUrl||photoCache[s.playerName]?`<img src="${s.playerPhotoUrl||photoCache[s.playerName]}">`:''}</div>
      <input type="file" id="photoFileInput" accept="image/png,image/jpeg,image/webp" style="display:none">
      <div>
        <div class="detail-title">${s.playerName||'?'}</div>
        <div class="detail-sub">${(s.storyType||'').replace(/_/g,' ').toUpperCase()} · ${s.playerSport||'NBA'} · ${rowId}</div>
      </div>
      <div class="detail-actions">
        <button class="btn btn-gold" onclick="openVideoPreview()">▶ Preview</button>
        <button class="btn btn-green btn-sm" onclick="approveAllClips('${rowId}')">✓ Approve All</button>
        <button class="btn btn-dim btn-sm" onclick="updateScriptStatus('${rowId}','Ready')">Mark Ready</button>
        ${s.renderUrl?`<a href="${s.renderUrl}" target="_blank" class="btn btn-dim btn-sm">Rendered</a>`:''}
        ${s.youtubeUrl?`<a href="${s.youtubeUrl}" target="_blank" class="btn btn-dim btn-sm">YouTube</a>`:''}
        <button class="btn btn-dim btn-sm" onclick="openRegenModal('${rowId}')">Regen Script${s.scriptVersions?.length ? ' ('+s.scriptVersions.length+')' : ''}</button>
        <button class="btn btn-dim btn-sm" onclick="generateVoiceover('${rowId}')">${s.voiceoverUrl?'Regen Voice':'Gen Voice'}</button>
        <button class="btn btn-dim btn-sm" onclick="sourceClips('${rowId}')">Re-source</button>
      </div>
    </div>

    ${(() => {
      const totalClips = clips.filter(c => c.clipUrl).length;
      const approvedClips = clips.filter(c => c.approved).length;
      const rejectedClips = clips.filter(c => c.rejected).length;
      const pct = totalClips > 0 ? Math.round((approvedClips / totalClips) * 100) : 0;
      return `<div class="approval-bar" style="padding:8px 20px;border-bottom:1px solid var(--border)">
        <span class="approval-label">${approvedClips}/${totalClips} approved</span>
        <div class="approval-track"><div class="approval-fill green" style="width:${pct}%"></div></div>
        ${rejectedClips > 0 ? `<span class="approval-label" style="color:var(--red)">${rejectedClips} rejected</span>` : ''}
        <span class="status-pill ${(s.status||'').toLowerCase()}">${s.status||'—'}</span>
      </div>`;
    })()}

    <div class="detail-workspace">
      <div class="detail-main">
        <div class="script-overview">
          <div class="script-toggle" onclick="this.nextElementSibling.classList.toggle('open')">
            <span>Script · <span id="wordCountLabel">${(s.script||'').split(/\s+/).filter(Boolean).length}</span> words</span>
            <span style="font-size:14px">▾</span>
          </div>
          <div class="script-body-text open">
            <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600">Hook Line</div>
            <div class="editable" contenteditable="true" data-field="hookLine" data-row="${rowId}" onblur="saveInlineEdit(this)" style="color:var(--gold);font-style:italic;margin-bottom:10px;font-size:13px;line-height:1.5">${s.hookLine||''}</div>
            <div class="edit-hint">Click to edit · changes save automatically</div>

            <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;margin-top:8px;font-weight:600">Script</div>
            <div class="editable" contenteditable="true" data-field="script" data-row="${rowId}" onblur="saveInlineEdit(this)" style="font-size:12px;line-height:1.7">${s.script||''}</div>
            <div class="edit-hint">Click to edit · changes save automatically</div>
          </div>
        </div>

        ${(() => {
            // Distribute 14 clips across segments proportionally to duration
            const totalDur = segments.reduce((s, seg) => s + (seg.end - seg.start), 0);
            const TOTAL_CLIPS = 28;
            let assignedClips = 0;
            const segClipRanges = segments.map((seg, i) => {
              const segDur = seg.end - seg.start;
              const proportion = segDur / totalDur;
              let numClips = Math.max(1, Math.round(proportion * TOTAL_CLIPS));
              // Last segment gets whatever's left
              if (i === segments.length - 1) numClips = TOTAL_CLIPS - assignedClips;
              const startIdx = assignedClips;
              assignedClips += numClips;
              return { startIdx, endIdx: startIdx + numClips - 1, numClips };
            });

            return segments.map((seg, i) => {
              const text = scriptSentences[i] || '';
              const range = segClipRanges[i];
              return `
              <div class="tl-segment ${i===0?'active':''}" onclick="selectSegment(${i}, ${range.startIdx})" data-seg="${i}" data-clip-start="${range.startIdx}" data-clip-end="${range.endIdx}">
                <div class="tl-seg-head">
                  <span class="tl-time">${formatTime(seg.start)}–${formatTime(seg.end)}</span>
                  <span class="tl-phase">${seg.name}</span>
                  <span style="font-size:9px;color:var(--text3);margin-left:auto">clips ${range.startIdx+1}–${range.endIdx+1}</span>
                </div>
                <div class="tl-text">${highlightText(text)}</div>
              </div>`;
            }).join("");
          })()}

          <div class="script-section" style="margin-top:16px">
            <div class="script-label" style="display:flex;align-items:center;justify-content:space-between">
              <span>Titles — pick 2 for A/B testing</span>
              <button class="btn btn-dim btn-sm" onclick="event.stopPropagation();generateTitles('${rowId}')" style="text-transform:none;letter-spacing:0">Generate 5 titles</button>
            </div>
            <div style="display:flex;flex-direction:column;gap:3px" id="titlePicker">
              ${(() => {
                const allTitles = s.allTitles || [s.titleA, s.titleB].filter(Boolean);
                const uniqueTitles = [...new Set(allTitles)];
                return uniqueTitles.map((t, i) => {
                  const isA = t === s.titleA;
                  const isB = t === s.titleB;
                  const isSelected = isA || isB;
                  const label = isA ? 'A' : isB ? 'B' : '';
                  return `<div class="script-meta" style="cursor:pointer;padding:6px 8px;border-radius:4px;border:1px solid ${isSelected?'var(--gold)':'var(--border)'};background:${isSelected?'var(--gold-dim)':'transparent'};display:flex;align-items:center;gap:6px" onclick="pickTitleForAB('${rowId}',${i})">
                    ${isSelected?`<span style="color:var(--gold);font-weight:700;font-size:10px;min-width:12px">${label}</span>`:'<span style="min-width:12px;font-size:10px;color:var(--text3)">·</span>'}
                    <span style="flex:1">${t}</span>
                  </div>`;
                }).join('');
              })()}
            </div>
          </div>
          <div class="script-section">
            <div class="script-label">Comment Bait</div>
            <div class="editable script-meta" contenteditable="true" data-field="commentBait" data-row="${rowId}" onblur="saveInlineEdit(this)">${s.commentBait||'—'}</div>
          </div>

          <div id="clipTimeline"></div>
        </div>

      <div class="detail-sidebar">
        <div class="phone-frame">
          <video id="clipVideo" muted loop autoplay></video>
          <div class="phone-overlay"></div>
        </div>
        <div style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)">Clip <span id="clipSlotLabel">#1</span></div>
        <div class="narrator-box">
          <div class="narrator-label">Narrator says:</div>
          <div id="clipNarratorText">Select a clip</div>
        </div>
        <div class="sidebar-actions">
          <div id="clipActions" style="display:flex;gap:4px">
            <button class="btn btn-green btn-sm" style="flex:1" onclick="approveClip(curClipIdx)">✓ Approve</button>
            <button class="btn btn-red btn-sm" style="flex:1" onclick="rejectClip(curClipIdx)">✗ Reject</button>
            <button class="btn btn-dim btn-sm" style="flex:1" onclick="replaceClip(curClipIdx)">↻ Replace</button>
          </div>
        </div>
        ${s.voiceoverUrl ? `
        <div>
          <div class="clip-panel-title">Voiceover</div>
          <audio controls preload="metadata" style="width:100%;height:28px;border-radius:4px;opacity:0.85" src="${s.voiceoverUrl}"></audio>
        </div>` : ''}
        <div class="sidebar-info">
          Clips: ${clips.filter(c=>c.clipUrl).length}/${clips.length} sourced<br>
          Music: ${s.musicMood||'—'}<br>
          Voice: ${s.voiceoverUrl?'<span style="color:var(--green)">Generated</span>':'Pending'}<br>
          Render: ${s.renderUrl?'<a href="'+s.renderUrl+'" target="_blank" style="color:var(--gold)">View</a>':'Pending'}
        </div>

        ${s.renderUrl ? `
          <div class="clip-panel-title" style="margin-top:16px">Rendered Video</div>
          <div class="render-player"><video src="${s.renderUrl}" controls preload="metadata"></video></div>
        ` : '<div class="render-placeholder">Not yet rendered</div>'}

        <div style="font-size:8px;color:var(--text3);font-family:'JetBrains Mono',monospace;line-height:2;padding:8px;background:var(--bg3);border-radius:4px;letter-spacing:0.3px">
          <span style="color:var(--text2)">KEYS</span><br>
          ↑↓ navigate · A approve · R reject<br>
          Space play/pause · P preview · Esc back
        </div>

        <div class="clip-panel-title" style="margin-top:16px">Status</div>
        <div class="script-meta">Clips: ${s.clipSourceStatus||'—'} (${clips.filter(c=>c.clipUrl).length}/${clips.length})</div>
        <div class="script-meta">Music: ${s.musicMood||'—'}</div>
        <div class="script-meta">Voiceover: ${s.voiceoverUrl?'Generated':'Pending'}</div>
        <div class="script-meta">Render: ${s.renderUrl?'Complete':'Pending'}</div>
      </div>
    </div>
  </div>`;

  // Render clip grid
  renderClipTimeline(clipUrls);
  selectClip(0, clipUrls);

  // Auto-fetch photo if missing
  if (!s.playerPhotoUrl && !photoCache[s.playerName]) {
    api("player-photo", { name: s.playerName }).then(({ url }) => {
      if (url) {
        photoCache[s.playerName] = url;
        const el = document.getElementById('detailPhoto');
        if (el) el.innerHTML = `<img src="${url}">`;
      }
    }).catch(() => {});
  }
}

function renderClipTimeline(clipUrls) {
  const timeline = document.getElementById("clipTimeline");
  if (!timeline) return;

  // Build caption chunks matched to each clip's timestamp
  const s = scriptData;
  const fullText = (s?.hookLine ? s.hookLine + '. ' : '') + (s?.script || '');
  const totalDur = 55;
  const clipDur = totalDur / clipUrls.length;

  // Split text into chunks, one per clip
  const allWords = fullText.split(/\s+/).filter(Boolean);
  const wordsPerClip = Math.ceil(allWords.length / clipUrls.length);

  // Store captions globally so selectClip can show exact text in sidebar
  window.clipCaptionsHtml = clipUrls.map((c, i) => {
    const startWord = i * wordsPerClip;
    const words = allWords.slice(startWord, startWord + wordsPerClip);
    return words.map(w => {
      const clean = w.replace(/[.,!?;:'"()\-—]/g, '');
      if (/^\d[\d,.]*$/.test(clean)) return `<span style="color:#F5A623">${w}</span>`;
      if (/^(never|nobody|worst|banned|fired|died|forgotten|zero)$/i.test(clean)) return `<span style="color:#FF3333">${w}</span>`;
      return w;
    }).join(' ');
  });
  const clipCaptions = window.clipCaptionsHtml;

  timeline.innerHTML = clipUrls.map((c, i) => {
    const approvalClass = c.approved ? 'approved' : (c.rejected ? 'rejected' : '');
    const reasonLabel = c.rejectionReason ? REJECTION_REASONS.find(r=>r.id===c.rejectionReason)?.label || c.rejectionReason : '';
    const statusDot = c.approved ? '<div class="clip-status-dot ok" title="Approved"></div>' :
                      c.rejected ? '<div class="clip-status-dot no" title="Rejected: '+reasonLabel.replace(/"/g,'')+'"></div>' :
                      '<div class="clip-status-dot pending" title="Pending"></div>';
    return `
    <div class="clip-row ${i===curClipIdx?'active':''} ${approvalClass}" data-idx="${i}" data-slot="${c.slot}" onclick="selectClip(${i})"
         draggable="true" ondragstart="dragStart(event,${i})" ondragover="dragOver(event)" ondrop="dropClip(event,${i})" ondragend="dragEnd(event)">
      ${statusDot}
      <div class="clip-row-num">${i+1}</div>
      <div class="clip-row-thumb">
        <video src="${c.url}" muted preload="metadata" onerror="this.style.display='none'"></video>
      </div>
      <div class="clip-row-text">
        <div class="clip-row-caption">${clipCaptions[i] || '—'}</div>
        <div class="clip-row-time">${formatTime(i * clipDur)}–${formatTime((i+1) * clipDur)}${c.rejected && reasonLabel ? ` · <span style="color:var(--red)">${reasonLabel}</span>` : ''}</div>
      </div>
      <div class="clip-row-actions">
        <button class="btn btn-sm btn-green" onclick="event.stopPropagation();approveClip(${i})" title="Approve" style="padding:2px 5px">✓</button>
        <button class="btn btn-sm btn-red" onclick="event.stopPropagation();rejectClip(${i})" title="Reject" style="padding:2px 5px">✗</button>
        <button class="btn btn-sm btn-dim" onclick="event.stopPropagation();replaceClip(${i})" title="Replace">↻</button>
        <span class="drag-handle" title="Drag to reorder">⠿</span>
      </div>
    </div>`;
  }).join("");
}

// Store current clip list globally so selectClip works without args
let curClipList = [];

function selectClip(idx, clips) {
  if (clips) curClipList = clips;
  clips = curClipList;
  if (!clips.length) return;

  curClipIdx = idx;
  const clip = clips[idx];
  if (!clip) return;

  // Update sidebar video preview
  document.getElementById("clipSlotLabel").textContent = `#${clip.slot}`;
  const vid = document.getElementById("clipVideo");
  if (vid.src !== clip.url) {
    vid.src = clip.url;
  }
  vid.currentTime = 0;
  vid.play().catch(()=>{});

  // Update active clip row highlight
  document.querySelectorAll('.clip-row').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
  });

  // Show exact per-clip caption text in sidebar (same words as the clip row)
  const captionHtml = (window.clipCaptionsHtml && window.clipCaptionsHtml[idx]) || '—';
  document.getElementById("clipNarratorText").innerHTML = captionHtml;

  // Update sidebar action buttons to current clip index
  document.getElementById("clipActions").innerHTML = `
    <button class="btn btn-green btn-sm" style="flex:1" onclick="approveClip(${idx})">✓ Approve</button>
    <button class="btn btn-red btn-sm" style="flex:1" onclick="rejectClip(${idx})">✗ Reject</button>
    <button class="btn btn-dim btn-sm" style="flex:1" onclick="replaceClip(${idx})">↻ Replace</button>
  `;
}

function selectSegment(segIdx, clipSlot) {
  // Highlight this segment
  document.querySelectorAll('.tl-segment').forEach((el,i) => el.classList.toggle('active', i===segIdx));

  // Select the first clip in this segment's range
  selectClip(clipSlot);
}

// ── Drag and Drop ──
let dragIdx = null;

function dragStart(e, idx) {
  dragIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.target.classList.add('dragging');
}

function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const row = e.target.closest('.clip-row');
  document.querySelectorAll('.clip-row').forEach(r => r.classList.remove('drag-over'));
  if (row) row.classList.add('drag-over');
}

function dropClip(e, targetIdx) {
  e.preventDefault();
  document.querySelectorAll('.clip-row').forEach(r => { r.classList.remove('drag-over'); r.classList.remove('dragging'); });
  if (dragIdx === null || dragIdx === targetIdx) return;
  if (!curClipList.length) return;

  // Swap the video clips between slots — text stays fixed to slot position
  const a = curClipList[dragIdx];
  const b = curClipList[targetIdx];

  // Swap URLs and video-related data, keep slot numbers fixed
  const swapFields = ['url', 'source', 'approved', 'rejected', 'rejectionReason', 'clipUrl'];
  const tmpVals = {};
  for (const f of swapFields) { tmpVals[f] = a[f]; a[f] = b[f]; b[f] = tmpVals[f]; }

  // Update the thumbnails in the DOM
  const rows = document.querySelectorAll('.clip-row');
  [dragIdx, targetIdx].forEach(idx => {
    const row = rows[idx];
    if (!row) return;
    const clip = curClipList[idx];
    // Update thumbnail video
    const thumbVid = row.querySelector('.clip-row-thumb video');
    if (thumbVid) thumbVid.src = clip.url;
    // Update approval state
    row.classList.toggle('approved', !!clip.approved);
    row.classList.toggle('rejected', !!clip.rejected);
    const dot = row.querySelector('.clip-status-dot');
    if (dot) dot.className = `clip-status-dot ${clip.approved ? 'ok' : clip.rejected ? 'no' : 'pending'}`;
  });

  // Update sidebar if either swapped slot is currently selected
  if (curClipIdx === dragIdx || curClipIdx === targetIdx) {
    selectClip(curClipIdx);
  }

  // Save new clip order to KV
  const order = curClipList.map(c => c.slot);
  apiPost("save-clip-order", { rowId: curScript, order });

  toast(`Swapped clip #${dragIdx+1} ↔ #${targetIdx+1}`);
  dragIdx = null;
}

function dragEnd(e) {
  document.querySelectorAll('.clip-row').forEach(r => { r.classList.remove('drag-over'); r.classList.remove('dragging'); });
  dragIdx = null;
}

async function approveClip(idx) {
  const slot = idx + 1;
  const row = document.querySelector(`.clip-row[data-slot="${slot}"]`);
  const wasApproved = row?.classList.contains('approved');

  if (row) {
    row.classList.toggle('approved', !wasApproved);
    row.classList.remove('rejected');
  }

  const dot = row?.querySelector('.clip-status-dot');
  if (dot) { dot.className = wasApproved ? 'clip-status-dot pending' : 'clip-status-dot ok'; }

  toast(wasApproved ? `Clip #${slot} unapproved` : `Clip #${slot} approved ✓`);
  await apiPost("approve-clip", { rowId: curScript, slot });
}

async function rejectClip(idx) {
  const slot = idx + 1;
  // Show rejection reason picker
  const row = document.querySelector(`.clip-row[data-slot="${slot}"]`);
  if (!row) return;

  // Remove any existing picker
  document.querySelector('.reject-picker')?.remove();

  const picker = document.createElement('div');
  picker.className = 'reject-picker';
  picker.style.cssText = `position:fixed;z-index:10;top:${row.getBoundingClientRect().top}px;left:${row.getBoundingClientRect().right + 8}px`;
  picker.innerHTML = `
    <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:4px 10px;margin-bottom:2px">Why reject?</div>
    ${REJECTION_REASONS.map(r => `<button class="reject-option" onclick="doRejectClip(${idx},'${r.id}')">${r.label}</button>`).join('')}
  `;
  document.body.appendChild(picker);

  // Close on click outside
  setTimeout(() => {
    const close = (e) => { if (!picker.contains(e.target)) { picker.remove(); document.removeEventListener('click', close); } };
    document.addEventListener('click', close);
  }, 50);
}

async function doRejectClip(idx, reason) {
  document.querySelector('.reject-picker')?.remove();
  const slot = idx + 1;
  const row = document.querySelector(`.clip-row[data-slot="${slot}"]`);
  if (row) { row.classList.add('rejected'); row.classList.remove('approved'); }

  const dot = row?.querySelector('.clip-status-dot');
  if (dot) { dot.className = 'clip-status-dot no'; dot.title = reason; }

  // Show reason text on the row
  const timeEl = row?.querySelector('.clip-row-time');
  const label = REJECTION_REASONS.find(r => r.id === reason)?.label || reason;
  if (timeEl && !timeEl.innerHTML.includes('color:var(--red)')) {
    timeEl.innerHTML += ` · <span style="color:var(--red)">${label}</span>`;
  }

  toast(`Clip #${slot} rejected: ${label}`);
  await apiPost("reject-clip", { rowId: curScript, slot, reason });

  // Auto-open YouTube search to find replacement
  setTimeout(() => openYouTubeSearch(slot), 300);
}

async function pickTitleForAB(rowId, titleIdx) {
  const s = scriptData;
  if (!s) return;
  const allTitles = s.allTitles || [s.titleA, s.titleB].filter(Boolean);
  const picked = allTitles[titleIdx];
  if (!picked) return;

  // If this title is already A or B, deselect it
  if (picked === s.titleA) {
    // Move B to A, clear B
    await apiPost("update-title", { rowId, titleA: s.titleB || '', titleB: '' });
  } else if (picked === s.titleB) {
    // Clear B
    await apiPost("update-title", { rowId, titleB: '' });
  } else if (!s.titleA) {
    // Set as A
    await apiPost("update-title", { rowId, titleA: picked });
  } else if (!s.titleB) {
    // Set as B
    await apiPost("update-title", { rowId, titleB: picked });
  } else {
    // Both A and B set — replace B with new pick
    await apiPost("update-title", { rowId, titleB: picked });
  }
  toast(`Updated A/B titles`);
  selectScript(rowId);
}

async function pollPipelineStatus() {
  if (pipelinePollTimer) clearInterval(pipelinePollTimer);

  const update = async () => {
    const { runs = [] } = await api("pipeline-status");
    const latest = runs[0];
    if (!latest) return;

    const statusEl = document.getElementById("statusText");
    if (latest.status === "in_progress" || latest.status === "queued") {
      statusEl.innerHTML = `<span style="color:var(--blue)">Pipeline running...</span>`;
    } else if (latest.conclusion === "success") {
      statusEl.innerHTML = `<span style="color:var(--green)">Pipeline done ✓</span>`;
      clearInterval(pipelinePollTimer);
      pipelinePollTimer = null;
      // Refresh current view
      if (curScript) selectScript(curScript);
    } else if (latest.conclusion === "failure") {
      statusEl.innerHTML = `<span style="color:var(--red)">Pipeline failed</span>`;
      clearInterval(pipelinePollTimer);
      pipelinePollTimer = null;
    }
  };

  await update();
  pipelinePollTimer = setInterval(update, 15000); // poll every 15s
}

// ── Helpers ──
function formatTime(s) { return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }

function getSegments(type) {
  const templates = {
    forgotten_legend: [
      {name:"hook",start:0,end:3},{name:"greatness",start:3,end:12},{name:"context",start:12,end:20},
      {name:"turn",start:20,end:32},{name:"forgotten",start:32,end:45},{name:"legacy",start:45,end:52},{name:"kicker",start:52,end:55}
    ],
    record_breaker: [
      {name:"hook",start:0,end:3},{name:"context",start:3,end:10},{name:"build",start:10,end:22},
      {name:"record",start:22,end:35},{name:"attempts",start:35,end:45},{name:"stands",start:45,end:52},{name:"kicker",start:52,end:55}
    ],
    what_if: [
      {name:"hook",start:0,end:3},{name:"who",start:3,end:10},{name:"event",start:10,end:22},
      {name:"alternate",start:22,end:35},{name:"ripple",start:35,end:45},{name:"verdict",start:45,end:52},{name:"kicker",start:52,end:55}
    ],
    scandal: [
      {name:"hook",start:0,end:3},{name:"rise",start:3,end:12},{name:"tension",start:12,end:22},
      {name:"unravel",start:22,end:35},{name:"fallout",start:35,end:45},{name:"legacy",start:45,end:52},{name:"kicker",start:52,end:55}
    ],
  };
  return templates[type] || templates.forgotten_legend;
}

function splitIntoSegments(hookLine, script, segments) {
  const full = (hookLine ? hookLine + ". " : "") + (script || "");
  const sentences = full.split(/(?<=[.!?])\s+/).filter(Boolean);
  const totalDur = segments.reduce((s,seg)=>s+(seg.end-seg.start),0);
  const results = [];
  let si = 0;
  for (const seg of segments) {
    const dur = seg.end - seg.start;
    const proportion = dur / totalDur;
    let n = Math.max(1, Math.round(proportion * sentences.length));
    n = Math.min(n, sentences.length - si);
    results.push(sentences.slice(si, si + n).join(" "));
    si += n;
  }
  if (si < sentences.length) results[results.length-1] += " " + sentences.slice(si).join(" ");
  return results;
}

async function doUpload(slot) {
  if (!uploadFile || !curScript) return;
  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  btn.textContent = 'Processing...';
  document.getElementById('uploadProgress').style.display = 'block';
  document.getElementById('uploadBar').style.width = '10%';

  const trimStart = parseFloat(document.getElementById('trimStart').value) || 0;
  const trimDur = parseFloat(document.getElementById('trimDur').value) || 2;

  try {
    // Step 1: Trim the video in the browser using a hidden video + canvas + MediaRecorder
    document.getElementById('uploadStatus').textContent = 'Trimming video...';
    const trimmedBlob = await trimVideoInBrowser(uploadFile, trimStart, trimDur);
    document.getElementById('uploadBar').style.width = '40%';

    // Step 2: Convert trimmed blob to base64
    document.getElementById('uploadStatus').textContent = 'Preparing upload...';
    const reader = new FileReader();
    const base64 = await new Promise((resolve, reject) => {
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(trimmedBlob);
    });

    document.getElementById('uploadBar').style.width = '60%';
    document.getElementById('uploadStatus').textContent = 'Uploading (' + (trimmedBlob.size/1024).toFixed(0) + 'KB)...';

    // Step 3: Upload to R2 via Vercel API
    const uploadResp = await fetch(`${API}&action=upload-clip`, {
      method: 'POST',
      headers: { 'x-secret': SECRET, 'Content-Type': 'application/json' },
      body: JSON.stringify({ rowId: curScript, slot, videoBase64: base64 }),
    });

    document.getElementById('uploadBar').style.width = '90%';

    if (uploadResp.ok) {
      const result = await uploadResp.json();
      document.getElementById('uploadBar').style.width = '100%';
      document.getElementById('uploadStatus').textContent = 'Clip replaced!';
      toast(`Clip #${slot} replaced successfully`);
      setTimeout(() => { closeUploadModal(); selectScript(curScript); }, 1000);
    } else {
      const err = await uploadResp.text();
      document.getElementById('uploadStatus').textContent = 'Upload failed: ' + err.slice(0, 100);
      btn.disabled = false;
      btn.textContent = 'Upload & Replace';
    }
  } catch (e) {
    document.getElementById('uploadStatus').textContent = 'Error: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Upload & Replace';
  }
}

// Trim video in browser using MediaRecorder + video element
function trimVideoInBrowser(file, startTime, duration) {
  return new Promise((resolve, reject) => {
    const video = document.createElement('video');
    video.muted = true;
    video.playsInline = true;
    video.src = URL.createObjectURL(file);

    video.onloadedmetadata = () => {
      // Create a canvas to capture frames
      const canvas = document.createElement('canvas');
      canvas.width = Math.min(video.videoWidth, 1080);
      canvas.height = Math.min(video.videoHeight, 1920);
      const ctx = canvas.getContext('2d');

      // Use MediaRecorder to capture the canvas as video
      const stream = canvas.captureStream(30);
      const recorder = new MediaRecorder(stream, {
        mimeType: 'video/webm;codecs=vp9',
        videoBitsPerSecond: 2000000,
      });

      const chunks = [];
      recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'video/webm' });
        URL.revokeObjectURL(video.src);
        resolve(blob);
      };

      // Seek to start time, then play and record for duration
      video.currentTime = startTime;
      video.onseeked = () => {
        recorder.start();
        video.play();

        // Draw frames to canvas
        const drawFrame = () => {
          if (video.currentTime >= startTime + duration || video.ended) {
            recorder.stop();
            video.pause();
            return;
          }
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          requestAnimationFrame(drawFrame);
        };
        drawFrame();

        // Safety timeout
        setTimeout(() => {
          if (recorder.state === 'recording') {
            recorder.stop();
            video.pause();
          }
        }, (duration + 1) * 1000);
      };
    };

    video.onerror = reject;
  });
}

function openVideoPreview() {
  if (!scriptData) return;
  const s = scriptData;
  const segments = getSegments(s.storyType);
  const sentences = splitIntoSegments(s.hookLine, s.script, segments);
  const clips = s.clipBriefs || [];

  // Build clip URLs for each 3s cut using the actual 18-slot clip list
  const cutClips = [];
  const TOTAL = 18;
  const clipDurPv = 55 / TOTAL; // ~3.05s per clip
  for (let i = 0; i < TOTAL; i++) {
    const brief = clips.find(c => c.slot === i + 1);
    cutClips.push({
      start: i * clipDurPv,
      duration: clipDurPv,
      url: brief?.clipUrl || `${R2}/${s.rowId}/clip_${i + 1}.mp4`,
      slot: i + 1,
    });
  }

  // Build short captions — max 5 words each for fast-paced Shorts
  const MAX_WORDS = 5;
  const WPM = 145;
  const SEC_PER_WORD = 60 / WPM;
  const captions = [];
  const fullText = (s.hookLine ? s.hookLine + '. ' : '') + (s.script || '');
  const allPvWords = fullText.split(/\s+/).filter(Boolean);

  let currentTime = 0;
  for (let i = 0; i < allPvWords.length; i += MAX_WORDS) {
    const chunk = allPvWords.slice(i, i + MAX_WORDS);
    const duration = chunk.length * SEC_PER_WORD;

    const coloredHtml = chunk.map(word => {
      const clean = word.replace(/[.,!?;:'"()\-—]/g, '');
      if (/^\d[\d,.]*$/.test(clean) || /^(record|mvp|championship|all-star|hall)$/i.test(clean)) {
        return `<span style="color:#F5A623">${word}</span>`;

        return `<span style="color:#FF3333">${word}</span>`;
      }
      return word;
    }).join(' ');

    captions.push({
      text: chunk.join(' '),
      html: coloredHtml,
      start: currentTime,
      duration: Math.max(duration, 0.8),
    });
    currentTime += Math.max(duration, 0.8);

          <div style="display:flex;flex-direction:column;align-items:center;gap:2px"><svg width="20" height="20" fill="#fff" viewBox="0 0 24 24"><path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/></svg><span style="font-size:8px;color:#fff">Share</span></div>
        </div>
        <div style="position:absolute;bottom:10px;left:8px;right:50px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="font-size:9px;font-weight:700;color:#fff">@SportsLore1</span><span style="font-size:8px;background:rgba(255,255,255,.15);color:#fff;padding:1px 6px;border-radius:8px">Subscribe</span></div>
          <div style="font-size:8px;color:rgba(255,255,255,.7);line-height:1.2">${s.titleA || ''} #shorts #nba</div>
        </div>
      </div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.1)"><div id="pvProgress" style="height:100%;background:#F5A623;width:0;transition:width 0.1s"></div></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;min-width:200px">
      <div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--gold)">${s.playerName}</div>
      <div style="font-size:11px;color:var(--text2)">${totalDur.toFixed(0)}s · ${cutClips.length} clips · ${captions.length} captions</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-dim" onclick="pvReset()">Reset</button>
        <button class="btn btn-gold" id="pvPlayBtn" onclick="pvToggle()">▶ Play</button>
      </div>
      <label style="font-size:10px;color:var(--text3);display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" id="pvYtToggle" onchange="document.getElementById('pvYoutubeUI').style.display=this.checked?'block':'none'" style="accent-color:var(--gold)">
        YouTube UI
      </label>
      <input type="range" id="pvScrubber" min="0" max="${(totalDur*10).toFixed(0)}" value="0" step="1"
        style="width:200px;accent-color:var(--gold);cursor:pointer"
        oninput="pvScrub(this.value)">
      <div style="font-size:11px;color:var(--text3)"><span id="pvTimeLabel">0.0s</span> / ${totalDur.toFixed(0)}s</div>
      <div id="pvCurrentCaption" style="font-size:12px;color:var(--text);text-align:center;max-width:200px;min-height:40px;line-height:1.4"></div>
      <button class="btn btn-dim" onclick="document.getElementById('previewModal').remove();pvStop();" style="margin-top:8px">Close</button>
    </div>
  `;
  document.body.appendChild(modal);

  // Store preview data globally
  window.pvData = { cutClips, captions, totalDur, segments, sentences };
  window.pvTime = 0;
  window.pvPlaying = false;
  window.pvInterval = null;

  // Preload first clip
  const vid = document.getElementById('pvVideo');
  if (cutClips[0]?.url) vid.src = cutClips[0].url;
}

function pvToggle() {
  if (window.pvPlaying) pvStop();
  else pvPlay();
}

function pvPlay() {
  window.pvPlaying = true;
  document.getElementById('pvPlayBtn').textContent = '⏸ Pause';
  window.pvInterval = setInterval(pvTick, 100);
}

function pvStop() {
  window.pvPlaying = false;
  if (window.pvInterval) clearInterval(window.pvInterval);
  window.pvInterval = null;
  const btn = document.getElementById('pvPlayBtn');
  if (btn) btn.textContent = '▶ Play';
}

function pvReset() {
  pvStop();
  window.pvTime = 0;
  pvRender(0);
  const scrub = document.getElementById('pvScrubber');
  if (scrub) scrub.value = 0;
}

function pvScrub(val) {
  window.pvTime = val / 10;
  pvRender(window.pvTime);
}

function pvTick() {
  window.pvTime += 0.1;
  if (window.pvTime >= window.pvData.totalDur) { pvStop(); return; }
  pvRender(window.pvTime);
  const scrub = document.getElementById('pvScrubber');
  if (scrub) scrub.value = Math.round(window.pvTime * 10);
}

function pvRender(t) {
  const { cutClips, captions, totalDur } = window.pvData;

  // Update progress
  const prog = document.getElementById('pvProgress');
  const timeLabel = document.getElementById('pvTimeLabel');
  if (prog) prog.style.width = (t / totalDur * 100) + '%';
  if (timeLabel) timeLabel.textContent = t.toFixed(1) + 's';

  // Cycle through clips — switch video source when entering a new cut
  const vid = document.getElementById('pvVideo');
  const curCut = cutClips.find(c => t >= c.start && t < c.start + c.duration);
  if (curCut && vid) {
    // Track which clip index we're on to detect changes
    const cutIdx = cutClips.indexOf(curCut);
    if (vid.dataset.cutIdx !== String(cutIdx)) {
      vid.dataset.cutIdx = String(cutIdx);
      vid.src = curCut.url;
      vid.currentTime = 0;
      vid.play().catch(()=>{});
    }
  }

  // Show/hide lower third (after hook, 3s+)
  const lt = document.getElementById('pvLowerThird');
  if (lt) lt.style.opacity = t >= 3 ? '1' : '0';

  // Stat cards removed — will iterate on these later

  // Show caption — per-word coloring (numbers=gold, dramatic=red)
  const capEl = document.getElementById('pvCaption');
  const sideCapEl = document.getElementById('pvCurrentCaption');
  if (capEl) {
    const activeCap = captions.find(c => t >= c.start && t < c.start + c.duration);
    if (activeCap) {
      capEl.style.opacity = '1';
      capEl.style.color = '#ffffff';
      capEl.innerHTML = activeCap.html;
      if (sideCapEl) sideCapEl.innerHTML = activeCap.html;
    } else {
      capEl.style.opacity = '0';
      if (sideCapEl) sideCapEl.innerHTML = '';
    }
  }
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', (e) => {
  // Never intercept browser shortcuts (Ctrl/Cmd+R, Ctrl+Shift+R, etc.)
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  // Don't capture when typing in inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (document.getElementById('uploadModal') || document.getElementById('previewModal')) {
    // In preview modal: Space = play/pause, Escape = close
    if (e.key === ' ' && document.getElementById('previewModal')) { e.preventDefault(); pvToggle(); }
    if (e.key === 'Escape') {
      document.getElementById('previewModal')?.remove(); pvStop?.();
      document.getElementById('uploadModal')?.remove();
    }
    return;
  }

  if (!curScript || !curClipList.length) return;

  switch (e.key) {
    case 'ArrowDown': case 'j':
      e.preventDefault();
      if (curClipIdx < curClipList.length - 1) selectClip(curClipIdx + 1);
      break;
    case 'ArrowUp': case 'k':
      e.preventDefault();
      if (curClipIdx > 0) selectClip(curClipIdx - 1);
      break;
    case 'a':
      e.preventDefault();
      approveClip(curClipIdx);
      break;
    case 'r':
      e.preventDefault();
      rejectClip(curClipIdx);
      break;
    case ' ':
      e.preventDefault();
      const vid = document.getElementById('clipVideo');
      if (vid) vid.paused ? vid.play() : vid.pause();
      break;
    case 'p':
      e.preventDefault();
      openVideoPreview();
      break;
    case 'Escape':
      if (curScript) closeDetail();
      break;
  }
});

// ── Init ──
async function loadAll() {
  document.getElementById("statusText").textContent = "Loading...";
  await loadBatches();
  if (curBatch) {
    await selectBatch(curBatch);
    // Fetch photos after table renders
    const { scripts = [] } = await api("scripts", { batchId: curBatch });
    fetchPlayerPhotos(scripts);
  }
  document.getElementById("statusText").textContent = `Updated ${new Date().toLocaleTimeString()}`;
}
loadAll();
</script>
