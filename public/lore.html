          <div style="text-align:right;min-width:80px">
            <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold-bright)">${avgViews.toLocaleString()} avg</div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:${parseFloat(avgRet) > 50 ? 'var(--green)' : 'var(--text3)'}">${avgRet}% ret</div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="section-header" style="margin-top:24px"><h1 class="section-title" style="font-size:20px">Weekly Trends</h1></div>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${weeks.reverse().map(w => {
        const totalViews = Object.values(w.byType || {}).reduce((s, d) => s + (d.views || d.avgViews * d.count || 0), 0);
        const totalVids = Object.values(w.byType || {}).reduce((s, d) => s + (d.count || 0), 0);
        return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:10px 14px;display:flex;align-items:center;gap:12px">
          <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);min-width:90px">${w.weekOf}</div>
          <div style="font-size:12px;color:var(--text)">${totalVids} videos</div>
          <div style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold)">${totalViews.toLocaleString()} views</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

// ── Cost Tracking ──
async function loadCosts() {
  const { costs = [] } = await api("cost-data");
  const container = document.getElementById('costsContent');

  if (!costs.length) {
    container.innerHTML = '<div class="empty">No costs logged yet. Costs are tracked when you generate titles, scripts, or voiceovers.</div>';
    return;
  }

  // Group by service
  const byService = {};
  let total = 0;
  costs.forEach(c => {
    if (!byService[c.service]) byService[c.service] = { total: 0, count: 0 };
    byService[c.service].total += c.amount;
    byService[c.service].count++;
    total += c.amount;
  });

  // Group by week
  const byWeek = {};
  costs.forEach(c => {
    const week = c.date?.slice(0, 10) || 'unknown';
    if (!byWeek[week]) byWeek[week] = 0;
    byWeek[week] += c.amount;
  });

  container.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px">
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px">
        <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;font-weight:600">Total Spent</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold-bright)">$${total.toFixed(2)}</div>
      </div>
      ${Object.entries(byService).map(([svc, d]) => `
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px">
          <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;font-weight:600">${svc}</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text)">$${d.total.toFixed(2)}</div>
          <div style="font-size:10px;color:var(--text3)">${d.count} calls</div>
        </div>
      `).join('')}
    </div>

    <div class="section-header"><h1 class="section-title" style="font-size:20px">Recent Activity</h1></div>
    <div style="display:flex;flex-direction:column;gap:4px">
      ${costs.slice().reverse().slice(0, 50).map(c => `
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:8px 14px;display:flex;align-items:center;gap:12px;font-size:11px">
          <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);min-width:70px">${c.date?.slice(5, 10) || ''}</span>
          <span style="color:var(--gold);min-width:80px;font-weight:600">${c.service}</span>
          <span style="color:var(--text);flex:1">${c.description || ''}</span>
          <span style="font-family:'JetBrains Mono',monospace;color:var(--text2)">$${c.amount.toFixed(2)}</span>
        </div>
      `).join('')}
    </div>
  `;
}

// ── VPS Health Check ──
async function checkVPSHealth() {
  const el = document.getElementById('vpsStatus');
  try {
    const { status } = await api("vps-health");
    if (status === 'online') {
      el.innerHTML = '<span style="width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block"></span> <span style="color:var(--green)">VPS</span>';
    } else if (status === 'not_configured') {
      el.innerHTML = '';
    } else {
      el.innerHTML = '<span style="width:5px;height:5px;border-radius:50%;background:var(--red);display:inline-block"></span> <span style="color:var(--red)">VPS offline</span>';
    }
  } catch {
    el.innerHTML = '';
  }
}

// ── Init ──
async function loadAll() {
  document.getElementById("statusText").textContent = "Loading...";
  await loadBatches();
  if (curBatch) {
    await selectBatch(curBatch);
    const { scripts = [] } = await api("scripts", { batchId: curBatch });
    fetchPlayerPhotos(scripts);
    // Restore script detail if we were viewing one
    const savedScript = sessionStorage.getItem('lore_script');
    if (savedScript) {
      await selectScript(savedScript);
    }
  }
  document.getElementById("statusText").textContent = `Updated ${new Date().toLocaleTimeString()}`;
  updateStatusBanner();
  checkVPSHealth();
}

async function updateStatusBanner() {
  if (!curBatch) {
    document.getElementById('statusBanner').innerHTML = '';
    return;
  }
  const { scripts = [] } = await api("scripts", { batchId: curBatch });
  const needClips = scripts.filter(s => s.hasScript && !s.hasClips).length;
  const needVoice = scripts.filter(s => s.hasClips && !s.hasVoice).length;
  const needReview = scripts.filter(s => s.hasClips && s.clipsApproved < s.clipsSourced).length;
  const needRender = scripts.filter(s => s.hasClips && s.hasVoice && !s.hasRender).length;
  const published = scripts.filter(s => s.isPublished).length;

  const parts = [];
  if (needClips > 0) parts.push(`<span class="stat"><span class="dot" style="background:var(--blue)"></span>${needClips} need clips</span>`);
  if (needReview > 0) parts.push(`<span class="stat"><span class="dot" style="background:var(--gold)"></span>${needReview} need review</span>`);
  if (needVoice > 0) parts.push(`<span class="stat"><span class="dot" style="background:var(--gold)"></span>${needVoice} need voice</span>`);
  if (needRender > 0) parts.push(`<span class="stat"><span class="dot" style="background:var(--red)"></span>${needRender} ready to render</span>`);
  parts.push(`<span class="stat"><span class="dot" style="background:var(--green)"></span>${published}/${scripts.length} published</span>`);
  document.getElementById('statusBanner').innerHTML = parts.join('');
}

loadAll();
</script>
